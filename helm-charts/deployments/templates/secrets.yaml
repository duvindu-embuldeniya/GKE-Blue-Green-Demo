apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.secret.dbName }}
  POSTGRES_USER: {{ .Values.secret.dbUser }}
  POSTGRES_PASSWORD: {{ .Values.secret.dbPassword }}
  SECRET_KEY: {{ .Values.secret.secretKey }}