apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: django-green-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: django-green
  minReplicas: {{ .Values.green.hpa.minReplicas }}
  maxReplicas: {{ .Values.green.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.green.hpa.cpuUtilization }}